<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>OpenDaemon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f1a;
  --sidebar-bg: #1a1a2e;
  --chat-bg: #0f0f1a;
  --border: #2a2a4a;
  --text: #e0e0e0;
  --text-2: #a0a0b0;
  --text-3: #555;
  --user-bg: #0f3460;
  --accent: #e94560;
  --accent-2: #533483;
  --input-bg: #16213e;
  --code-bg: #0d1117;
  --tool-bg: #1e2a3a;
  --hover: rgba(255,255,255,0.05);
  --active: rgba(255,255,255,0.1);
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; height: 100dvh; display: flex; overflow: hidden; }

/* ── Sidebar ── */
.sidebar { width: 260px; min-width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.sidebar-header { padding: 14px 16px 10px; display: flex; align-items: center; gap: 10px; }
.sidebar-header h1 { font-size: 15px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; flex: 1; cursor: pointer; }
.sidebar-header .sb-icon-btn { width: 30px; height: 30px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; transition: all 0.15s; }
.sidebar-header .sb-icon-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(233,69,96,0.08); }

.new-chat-bar { padding: 6px 12px 4px; display: flex; gap: 0; }
.new-chat-btn { flex: 1; padding: 9px 14px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; border: none; border-radius: 10px 0 0 10px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: opacity 0.15s; letter-spacing: 0.2px; }
.new-chat-btn:hover { opacity: 0.9; }
.engine-toggle-btn { padding: 9px 10px; background: linear-gradient(135deg, var(--accent-2), var(--accent-2)); color: white; border: none; border-left: 1px solid rgba(255,255,255,0.2); border-radius: 0 10px 10px 0; cursor: pointer; display: flex; align-items: center; transition: opacity 0.15s; }
.engine-toggle-btn:hover { opacity: 0.8; }
.engine-toggle-btn svg { transition: transform 0.2s; }
.engine-toggle-btn.open svg { transform: rotate(180deg); }
/* Engine picker popover */
.engine-picker { display: none; position: absolute; left: 12px; right: 12px; top: 100%; margin-top: 4px; background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 10px; padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 50; }
.engine-picker.open { display: block; }
.engine-picker-item { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 8px; }
.engine-picker-item:hover { background: var(--hover); color: var(--text); }
.engine-picker-item.selected { background: var(--active); color: var(--text); }
.new-chat-wrap { position: relative; }

/* Search bar */
.sb-search-bar { padding: 4px 12px 6px; display: none; }
.sb-search-bar.visible { display: block; }
.sb-search-wrap { position: relative; }
.sb-search-wrap .sb-search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 12px; pointer-events: none; }
.sb-search-input { width: 100%; padding: 7px 10px 7px 28px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; outline: none; }
.sb-search-input::placeholder { color: var(--text-3); }
.sb-search-input:focus { border-color: var(--accent); }

.engine-select { display: none; }

.conv-list { flex: 1; overflow-y: auto; padding: 2px 8px; }
.conv-group-label { padding: 8px 12px 4px; font-size: 10px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
.conv-item { padding: 9px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 1px; transition: background 0.1s; border-left: 2px solid transparent; }
.conv-item:hover { background: var(--hover); }
.conv-item.active { background: var(--active); border-left-color: var(--accent); }
.conv-icon { width: 22px; height: 22px; border-radius: 6px; background: rgba(233,69,96,0.15); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.conv-title { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.conv-time { font-size: 10px; color: var(--text-3); flex-shrink: 0; margin-right: 2px; }
.conv-item:hover .conv-time { display: none; }
.conv-del { display: none; width: 22px; height: 22px; border: none; background: none; cursor: pointer; color: var(--text-3); border-radius: 4px; font-size: 14px; flex-shrink: 0; align-items: center; justify-content: center; }
.conv-item:hover .conv-del { display: flex; }
.conv-del:hover { color: var(--accent); background: rgba(233,69,96,0.1); }
/* Context menu */
.conv-ctx-menu { position: fixed; background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 10px; padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200; min-width: 150px; display: none; }
.conv-ctx-menu.open { display: block; }
.conv-ctx-item { padding: 7px 12px; border-radius: 6px; font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 8px; cursor: pointer; }
.conv-ctx-item:hover { background: var(--hover); color: var(--text); }
.conv-ctx-item.danger { color: #f87171; }
.conv-ctx-item.danger:hover { background: rgba(248,113,113,0.08); }
.conv-ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }
/* Unread dot on conversation item */
.conv-unread { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; display: none; }
.conv-item.unread .conv-unread { display: block; }
.conv-item.unread .conv-title { color: #fff; font-weight: 600; }
/* Notification dot on menu button */
.menu-btn { position: relative; }
.menu-dot { display: none; position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.menu-btn.has-unread .menu-dot { display: block; }

.sidebar-footer { padding: 6px 8px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 2px; }
.sidebar-footer .footer-btn { flex: 1; padding: 7px 4px; background: none; border: none; border-radius: 8px; color: var(--text-3); font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: all 0.15s; }
.sidebar-footer .footer-btn:hover { background: var(--hover); color: var(--accent); }
.sidebar-footer .footer-btn .footer-icon { font-size: 16px; line-height: 1; }
.sidebar-footer .footer-btn .footer-label { font-size: 10px; letter-spacing: 0.2px; }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

.chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--sidebar-bg); }
.chat-header .engine-label { font-size: 14px; font-weight: 600; }
.chat-header .status { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #1a3a1a; color: #4ade80; }
.chat-header .status.busy { background: #3a3a1a; color: #facc15; }
.chat-header .status.error { background: #3a1a1a; color: #f87171; }
.chat-header .session-info { font-size: 11px; color: var(--text-3); font-family: monospace; }

.messages { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
.messages-wrap { position: relative; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.message { margin-bottom: 20px; max-width: 900px; margin-left: auto; margin-right: auto; position: relative; }
.message.user { display: flex; justify-content: flex-end; }
.message.user .bubble { background: var(--user-bg); border-radius: 16px 16px 4px 16px; padding: 10px 16px; max-width: 75%; white-space: pre-wrap; word-break: break-word; }
.message.assistant .bubble { line-height: 1.6; }
/* Message copy button */
.msg-copy { position: absolute; top: 4px; opacity: 0; background: var(--tool-bg); border: 1px solid var(--border); color: var(--text-3); padding: 2px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: opacity 0.2s; z-index: 1; }
.message.assistant .msg-copy { right: 4px; }
.message.user .msg-copy { left: 4px; }
.message:hover .msg-copy { opacity: 1; }
.msg-copy:hover { color: var(--text); border-color: var(--accent); }

/* Feedback buttons */
.msg-feedback { display: flex; gap: 4px; margin-top: 6px; opacity: 0; transition: opacity 0.2s; }
.message:hover .msg-feedback { opacity: 1; }
.msg-feedback.has-feedback { opacity: 1; }
.fb-btn { background: none; border: 1px solid var(--border); color: var(--text-3); padding: 2px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.fb-btn:hover { color: var(--text); border-color: var(--text-2); }
.fb-btn.active-up { color: #4ade80; border-color: #4ade80; background: rgba(74,222,128,0.1); }
.fb-btn.active-down { color: #f87171; border-color: #f87171; background: rgba(248,113,113,0.1); }

.welcome { text-align: center; color: var(--text-3); margin-top: 30vh; font-size: 14px; }

/* Code & markdown */
.message pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 0; overflow-x: auto; margin: 8px 0; font-size: 13px; line-height: 1.5; position: relative; }
.message pre code { display: block; padding: 12px; overflow-x: auto; }
.message code { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; }
.message :not(pre) > code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); }
.bubble strong { font-weight: 600; }
.bubble h1,.bubble h2,.bubble h3,.bubble h4 { margin: 12px 0 6px; }
.bubble h1 { font-size: 18px; } .bubble h2 { font-size: 16px; } .bubble h3 { font-size: 14px; } .bubble h4 { font-size: 13px; font-weight: 600; }
.bubble ul,.bubble ol { padding-left: 20px; margin: 6px 0; }
.bubble li { margin: 2px 0; }
.bubble li > ul,.bubble li > ol { margin: 2px 0; }
.bubble blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--text-2); margin: 8px 0; }
.bubble .table-wrap { overflow-x: auto; margin: 8px 0; -webkit-overflow-scrolling: touch; }
.bubble table { border-collapse: collapse; width: 100%; table-layout: auto; }
.bubble th,.bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-size: 13px; word-break: break-word; overflow-wrap: break-word; min-width: 60px; max-width: 360px; }
.bubble th { background: var(--tool-bg); }
.bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.bubble a { color: var(--accent); text-decoration: none; }
.bubble a:hover { text-decoration: underline; }
.bubble p { margin: 6px 0; }
.bubble p:first-child { margin-top: 0; }
.bubble p:last-child { margin-bottom: 0; }
.bubble img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
/* Override highlight.js background to match theme */
.hljs { background: transparent !important; }
/* Code block language label */
.code-lang { position: absolute; top: 0; right: 0; padding: 2px 8px; font-size: 11px; color: var(--text-3); background: var(--tool-bg); border-radius: 0 8px 0 6px; font-family: inherit; }
/* Copy button on code blocks */
.code-copy { position: absolute; top: 0; right: 0; padding: 4px 8px; font-size: 11px; color: var(--text-3); background: var(--tool-bg); border: none; border-radius: 0 8px 0 6px; cursor: pointer; opacity: 0; transition: opacity 0.2s; font-family: inherit; }
.message pre:hover .code-copy { opacity: 1; }
.code-copy:hover { color: var(--text); }

/* Tool blocks */
.tool-block { background: var(--tool-bg); border: 1px solid var(--border); border-radius: 8px; margin: 8px 0; overflow: hidden; }
.tool-header { padding: 6px 12px; font-size: 12px; font-weight: 600; color: #7aa2f7; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
.tool-header::before { content: "\25B6"; font-size: 10px; margin-right: 6px; transition: transform 0.2s; display: inline-block; }
.tool-block.expanded .tool-header::before { transform: rotate(90deg); }
.tool-body { display: none; padding: 8px 12px; font-size: 12px; color: var(--text-2); font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
.tool-block.expanded .tool-body { display: block; }

/* Thinking */
.thinking-block { border-left: 3px solid var(--accent-2); padding: 8px 12px; margin: 8px 0; border-radius: 0 8px 8px 0; font-size: 13px; color: var(--text-2); white-space: pre-wrap; max-height: 40px; overflow: hidden; cursor: pointer; position: relative; }
.thinking-block::after { content: "... click to expand"; position: absolute; bottom: 0; right: 0; padding: 2px 8px; background: var(--bg); color: var(--text-3); font-size: 11px; }
.thinking-block.expanded { max-height: 300px; overflow-y: auto; }
.thinking-block.expanded::after { display: none; }

/* Loading */
.loading-indicator { display: flex; align-items: center; gap: 8px; color: var(--text-3); font-size: 13px; padding: 4px 0; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Rate limit */
.rate-limit-banner { display: none; padding: 8px 20px; background: #3a2a00; color: #facc15; font-size: 12px; text-align: center; }

/* Input — WeChat-style */
.input-area { padding: 10px 12px 12px; border-top: 1px solid var(--border); background: var(--sidebar-bg); }
.input-row { max-width: 900px; margin: 0 auto; display: flex; gap: 6px; align-items: flex-end; }
.input-wrapper { position: relative; flex: 1; }
.input-wrapper textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 15px; font-family: inherit; resize: none; min-height: 40px; max-height: 120px; outline: none; transition: border-color 0.2s; }
.input-wrapper textarea:focus { border-color: var(--accent); }
/* Icon buttons (voice, attach) — WeChat flat style */
.input-icon-btn { background: none !important; border: none !important; color: var(--text-2) !important; padding: 0 !important; font-size: 24px !important; line-height: 1; cursor: pointer; width: 36px; height: 40px; display: flex; align-items: center; justify-content: center; transition: color 0.2s; flex-shrink: 0; position: relative; }
.input-icon-btn:hover { color: var(--text) !important; }
.input-icon-btn:active { transform: scale(0.92); }
.input-icon-btn.unsupported { opacity: 0.25 !important; cursor: not-allowed !important; }
/* Voice recording state */
.input-icon-btn.recording { color: var(--accent) !important; }
.input-icon-btn.recording svg .mic-body { animation: voice-pulse-fill 1.2s ease-in-out infinite; }
@keyframes voice-pulse-fill { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
/* Hold-to-talk button (voice mode) */
.voice-hold-btn { display: none; flex: 1; height: 40px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-2); font-size: 15px; font-weight: 500; cursor: pointer; user-select: none; -webkit-user-select: none; transition: all 0.15s; letter-spacing: 1px; }
.voice-hold-btn:active, .voice-hold-btn.holding { background: var(--active); color: var(--accent); border-color: var(--accent); }
.input-area.voice-mode .input-wrapper { display: none; }
.input-area.voice-mode .voice-hold-btn { display: block; }
/* Send button — WeChat green-accent circle */
.send-btn { background: var(--accent) !important; color: white !important; border: none !important; border-radius: 8px !important; width: 40px; height: 40px; font-size: 18px !important; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; padding: 0 !important; }
.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.send-btn.stop { background: #dc3545 !important; }
.send-btn svg { width: 20px; height: 20px; fill: currentColor; }
/* Plus/attach button hidden when send is active */
.attach-plus { transition: all 0.2s; }
/* Voice tooltip */
.voice-tooltip { position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); border-radius: 8px; padding: 8px 16px; font-size: 13px; color: #fff; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 50; backdrop-filter: blur(8px); }
.voice-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: rgba(0,0,0,0.75); }
.voice-hold-btn.holding ~ .voice-tooltip, .input-icon-btn.recording .voice-tooltip { opacity: 1; }
/* Voice overlay (hold-to-talk feedback) */
.voice-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; flex-direction: column; gap: 16px; backdrop-filter: blur(4px); }
.voice-overlay.active { display: flex; }
.voice-overlay-inner { background: var(--sidebar-bg); border-radius: 16px; padding: 32px 48px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
.voice-overlay-waves { display: flex; align-items: center; gap: 3px; height: 40px; }
.voice-overlay-waves span { display: block; width: 4px; border-radius: 2px; background: var(--accent); animation: wave-bar 0.8s ease-in-out infinite; }
.voice-overlay-waves span:nth-child(1) { height: 12px; animation-delay: 0s; }
.voice-overlay-waves span:nth-child(2) { height: 24px; animation-delay: 0.1s; }
.voice-overlay-waves span:nth-child(3) { height: 36px; animation-delay: 0.2s; }
.voice-overlay-waves span:nth-child(4) { height: 24px; animation-delay: 0.3s; }
.voice-overlay-waves span:nth-child(5) { height: 12px; animation-delay: 0.4s; }
@keyframes wave-bar { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.4); } }
.voice-overlay-text { color: var(--text-2); font-size: 14px; }
.voice-overlay-cancel { color: var(--accent); font-size: 13px; margin-top: 4px; }
.voice-overlay.cancel-zone .voice-overlay-text { color: var(--accent); }
.input-hint { max-width: 900px; margin: 4px auto 0; font-size: 11px; color: var(--text-3); text-align: center; }

/* Attachment preview */
.attachment-preview { max-width: 900px; margin: 0 auto 8px; display: flex; gap: 8px; flex-wrap: wrap; }
.attachment-preview:empty { display: none; }
.att-thumb { position: relative; display: inline-flex; align-items: center; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.att-thumb img { height: 60px; max-width: 100px; object-fit: cover; display: block; }
.att-thumb .att-file-chip { padding: 8px 12px; font-size: 12px; color: var(--text-2); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.att-thumb .att-file-chip .att-size { color: var(--text-3); font-size: 10px; margin-left: 4px; }
.att-thumb .att-remove { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.att-thumb .att-remove:hover { background: #dc3545; }
.att-thumb.uploading { opacity: 0.5; }
.att-thumb.uploading::after { content: ''; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }

/* Drag & drop overlay */
.main.drag-over::after { content: '📎 Drop files here'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); color: white; font-size: 20px; font-weight: 600; z-index: 50; border: 3px dashed var(--accent); pointer-events: none; }
.main { position: relative; }

/* Inline attachments in messages */
.msg-attachments { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.msg-attachments img { max-width: 300px; max-height: 200px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); }
.msg-attachments img:hover { opacity: 0.9; }
.msg-att-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--tool-bg); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--text-2); text-decoration: none; }
.msg-att-chip:hover { border-color: var(--accent); color: var(--accent); }

/* Scroll-to-bottom button */
.scroll-bottom-btn { display: none; position: absolute; bottom: 16px; right: 20px; background: var(--sidebar-bg); border: 1px solid var(--border); color: var(--text-2); padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: opacity 0.2s; }
.scroll-bottom-btn:hover { color: var(--accent); border-color: var(--accent); }
.scroll-bottom-btn.visible { display: flex; align-items: center; gap: 4px; }

/* Image lightbox */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; cursor: pointer; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 4px; }

/* Autocomplete */
.autocomplete { display: none; position: absolute; bottom: 100%; left: 0; right: 0; max-height: 260px; overflow-y: auto; background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; box-shadow: 0 -4px 16px rgba(0,0,0,0.4); z-index: 100; }
.autocomplete.visible { display: block; }
.autocomplete-item { padding: 8px 14px; cursor: pointer; display: flex; align-items: baseline; gap: 10px; border-bottom: 1px solid var(--border); }
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:hover,.autocomplete-item.selected { background: var(--active); }

<script>
// ── State ──
let engines = [];
let conversations = [];
let currentConvId = null;
let currentEngine = null;
let isStreaming = false;
let streamingConvId = null; // track which conversation is streaming
let abortController = null;
let allCommands = [];
let wasBackgrounded = false;
const unreadConvs = new Set();
let pendingAttachments = []; // [{id, filename, mime_type, size_bytes, category, url}]

const $ = (id) => document.getElementById(id);
const messagesEl = $('messages');
const inputEl = $('input');
const sendBtn = $('sendBtn');
const engineSelect = $('engineSelect');
const convList = $('convList');
const statusBadge = $('statusBadge');
const sessionInfo = $('sessionInfo');
const autocompleteEl = $('autocomplete');

// ── Init ──
async function init() {
  try {
    const enginesResp = await api('GET', '/api/engines');
    // Server returns {engines: [...], server_boot: ...}
    engines = enginesResp.engines || enginesResp;
    window._serverBoot = enginesResp.server_boot || null;
    engineSelect.innerHTML = engines.map(e =>
      `<option value="${e.id}">${e.icon ? e.icon + ' ' : ''}${e.label}</option>`
    ).join('');
    await loadConversations();
    loadCommands();
    // Auto-select the most recent conversation
    if (conversations.length > 0 && !currentConvId) {
      selectConversation(conversations[0].id);
    }
  } catch (err) {
    if (err.message.includes('401') || err.message.includes('unauthorized')) {
      window.location.href = '/login.html';
    }
  }
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(path, opts);
  if (res.status === 401) throw new Error('unauthorized');
  if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || res.statusText); }
  return res.json();
}

// ── Conversations ──
async function loadConversations() {
  conversations = await api('GET', '/api/conversations');
  renderConversations();
}

function relativeTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
  if (diff < 604800000) return Math.floor(diff / 86400000) + 'd';
  return Math.floor(diff / 604800000) + 'w';
}

function renderConversations(filter) {
  let list = conversations;
  if (filter) {
    const q = filter.toLowerCase();
    list = conversations.filter(c => c.title.toLowerCase().includes(q));
  }
  if (list.length === 0) {
    convList.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-3);font-size:13px;">${filter ? 'No matches' : 'No conversations yet'}</div>`;
    return;
  }
  const now = Date.now();
  const dayMs = 86400000;
  const todayStart = new Date().setHours(0,0,0,0);
  const groups = { today: [], yesterday: [], earlier: [] };
  for (const c of list) {
    if (c.updated_at >= todayStart) groups.today.push(c);
    else if (c.updated_at >= todayStart - dayMs) groups.yesterday.push(c);
    else groups.earlier.push(c);
  }

  let html = '';
  const renderGroup = (label, items) => {
    if (items.length === 0) return '';
    let h = `<div class="conv-group-label">${label}</div>`;
    for (const c of items) {
      const eng = engines.find(e => e.id === c.engine_id);
      const icon = eng?.icon || '?';
      const active = c.id === currentConvId ? ' active' : '';
      const unread = unreadConvs.has(c.id) ? ' unread' : '';
      const time = relativeTime(c.updated_at);
      h += `<div class="conv-item${active}${unread}" data-conv-id="${c.id}" onclick="selectConversation('${c.id}')" oncontextmenu="event.preventDefault();showConvCtxMenu(event,'${c.id}')">
        <div class="conv-icon">${esc(icon)}</div>
        <div class="conv-title">${esc(c.title)}</div>
        <div class="conv-unread"></div>
        <span class="conv-time">${time}</span>
        <button class="conv-del" onclick="event.stopPropagation();deleteConv('${c.id}')">&times;</button>
      </div>`;
    }
    return h;
  };
  html += renderGroup('Today', groups.today);
  html += renderGroup('Yesterday', groups.yesterday);
  html += renderGroup('Earlier', groups.earlier);
  convList.innerHTML = html;
}

// ── Sidebar search ──
function toggleSidebarSearch() {
  const bar = $('sbSearchBar');
  const isVisible = bar.classList.toggle('visible');
  if (isVisible) {
    $('sbSearchInput').focus();
  } else {
    $('sbSearchInput').value = '';
    renderConversations();
  }
}
function filterConversations(q) {
  renderConversations(q || undefined);
}

// ── Engine picker popover ──
function toggleEnginePicker() {
  const picker = $('enginePicker');
  const btn = $('engineToggleBtn');
  if (picker.classList.contains('open')) {
    picker.classList.remove('open');
    btn.classList.remove('open');
    return;
  }
  picker.innerHTML = engines.map(e => {
    const sel = e.id === engineSelect.value ? ' selected' : '';
    return `<div class="engine-picker-item${sel}" onclick="pickEngine('${e.id}')">${e.icon ? e.icon + ' ' : ''}${esc(e.label)}</div>`;
  }).join('');
  picker.classList.add('open');
  btn.classList.add('open');
}
function pickEngine(id) {
  engineSelect.value = id;
  $('enginePicker').classList.remove('open');
  $('engineToggleBtn').classList.remove('open');
}
// Close picker when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.new-chat-wrap')) {
    $('enginePicker').classList.remove('open');
    $('engineToggleBtn').classList.remove('open');
  }
});

// ── Context menu for conversations ──
let ctxMenuConvId = null;
function showConvCtxMenu(e, convId) {
  ctxMenuConvId = convId;
  const menu = $('convCtxMenu');
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.classList.add('open');
}
function hideConvCtxMenu() {
  $('convCtxMenu').classList.remove('open');
  ctxMenuConvId = null;
}
document.addEventListener('click', hideConvCtxMenu);

async function ctxRenameConv() {
  if (!ctxMenuConvId) return;
  hideConvCtxMenu();
  const conv = conversations.find(c => c.id === ctxMenuConvId);
  if (!conv) return;
  const newTitle = prompt('Rename conversation:', conv.title);
  if (newTitle && newTitle.trim()) {
    try {
      await api('PATCH', `/api/conversations/${ctxMenuConvId}`, { title: newTitle.trim() });
      conv.title = newTitle.trim();
      renderConversations();
    } catch (err) { console.error('Rename failed:', err); }
  }
}
async function ctxDeleteConv() {
  if (!ctxMenuConvId) return;
  const id = ctxMenuConvId;
  hideConvCtxMenu();
  await deleteConv(id);
}

async function newChat() {
  const engineId = engineSelect.value;
  $('enginePicker').classList.remove('open');
  const conv = await api('POST', '/api/conversations', { engine_id: engineId });
  conversations.unshift(conv);
  renderConversations();
  selectConversation(conv.id);
}

async function selectConversation(id) {
  currentConvId = id;
  userScrolledUp = false;
  $('scrollBottomBtn').classList.remove('visible');
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  currentEngine = engines.find(e => e.id === conv.engine_id);
  $('engineLabel').textContent = currentEngine?.label || conv.engine_id;
  closeSidebar();
  sessionInfo.textContent = '';
  inputEl.disabled = false;
  sendBtn.disabled = false;

  // Sync stop button & status indicator with whether THIS conversation is streaming
  if (isStreaming && streamingConvId === id) {
    sendBtn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
    sendBtn.className = 'send-btn stop';
    sendBtn.onclick = stopStreaming;
  } else {
    sendBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
    sendBtn.className = 'send-btn';
    sendBtn.onclick = sendMessage;
    setStatus('', 'Ready');
  }

  // Mark as read and update active state without rebuilding DOM
  unreadConvs.delete(id);
  document.querySelectorAll('.conv-item').forEach(el => {
    const isThis = el.dataset.convId === id;
    el.classList.toggle('active', isThis);
    if (isThis) el.classList.remove('unread');
  });
  updateMenuDot();

  // Load messages
  const msgs = await api('GET', `/api/conversations/${id}/messages`);
  messagesEl.innerHTML = '';
  if (msgs.length === 0) {
    messagesEl.innerHTML = '<div class="welcome">Start a conversation</div>';
  } else {
    for (const m of msgs) {
      if (m.role === 'user') addUserBubble(m.content, m.attachments);
      else if (m.content === '...') addStreamingBubble();
      else if (m.content.includes('<!-- streaming -->')) addStreamingBubble(m.content.replace('<!-- streaming -->', ''));
      else {
        addAssistantBubble(m.content);
        // Add feedback buttons to loaded assistant messages
        const lastMsg = messagesEl.lastElementChild;
        if (lastMsg && m.id) addFeedbackButtons(lastMsg, m.id);
      }
    }
    // Instant scroll (bypass smooth) after loading history
    messagesEl.style.scrollBehavior = 'auto';
    messagesEl.scrollTop = messagesEl.scrollHeight;
    // Retry after layout settles (complex markdown/code blocks)
    requestAnimationFrame(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
      requestAnimationFrame(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
        // Restore smooth scrolling for future messages
        messagesEl.style.scrollBehavior = '';
      });
    });
  }
}

async function deleteConv(id) {
  await api('DELETE', `/api/conversations/${id}`);
  conversations = conversations.filter(c => c.id !== id);
  if (currentConvId === id) {

    sendBtn.disabled = true;

}

// ── Voice Input — WeChat-style (Web Speech API) ──
let voiceRecognition = null;
let voiceIsListening = false;
let voiceMode = false;          // true = hold-to-talk mode
let voiceCancelled = false;
let voiceStartY = 0;

const KEYBOARD_SVG = '<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 5H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z"/></svg>';
const MIC_SVG = '<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path class="mic-body" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';

function initVoiceInput() {
  try {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      $('voiceToggleBtn').classList.add('unsupported');
      $('voiceToggleBtn').title = 'Browser does not support voice input';
      return;
    }
    voiceRecognition = new SpeechRecognition();
    voiceRecognition.continuous = true;
    voiceRecognition.interimResults = true;
    voiceRecognition.lang = navigator.language || 'zh-CN';

    let finalTranscript = '';

    voiceRecognition.onstart = () => {
      voiceIsListening = true;
      $('voiceToggleBtn').classList.add('recording');
      $('voiceTooltip').textContent = 'Listening...';
    };

    voiceRecognition.onresult = (event) => {
      try {
        let interim = '';
        finalTranscript = '';
        for (let i = 0; i < event.results.length; i++) {
          const r = event.results[i];
          if (r.isFinal) { finalTranscript += r[0].transcript; }
          else { interim += r[0].transcript; }
        }
        const display = finalTranscript + interim;
        // Update tooltip / overlay
        $('voiceTooltip').textContent = display.slice(-30) || 'Listening...';
        if ($('voiceOverlay').classList.contains('active')) {
          $('voiceOverlayText').textContent = display.slice(-40) || 'Listening...';
        }
        // Update textarea
        const textarea = $('input');
        textarea.value = display;
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
      } catch (e) { console.error('Voice result error:', e); }
    };

    voiceRecognition.onend = () => {
      try {
        voiceIsListening = false;
        $('voiceToggleBtn').classList.remove('recording');
        $('voiceOverlay').classList.remove('active');
        if (voiceCancelled) {
          $('input').value = '';
          voiceCancelled = false;
        } else if (finalTranscript) {
          $('input').value = finalTranscript;
          $('input').style.height = 'auto';
          $('input').style.height = $('input').scrollHeight + 'px';
        }
        $('voiceTooltip').textContent = 'Listening...';
        finalTranscript = '';
      } catch (e) { console.error('Voice end error:', e); }
    };

    voiceRecognition.onerror = (event) => {
      console.error('Voice recognition error:', event.error);
      voiceIsListening = false;
      $('voiceToggleBtn').classList.remove('recording');
      $('voiceOverlay').classList.remove('active');
    };

    // Hold-to-talk touch events
    const holdBtn = $('voiceHoldBtn');
    holdBtn.addEventListener('touchstart', voiceHoldStart, { passive: false });
    holdBtn.addEventListener('touchmove', voiceHoldMove, { passive: false });
    holdBtn.addEventListener('touchend', voiceHoldEnd);
    holdBtn.addEventListener('touchcancel', voiceHoldEnd);
    // Mouse fallback for desktop
    holdBtn.addEventListener('mousedown', voiceHoldStart);
    holdBtn.addEventListener('mousemove', voiceHoldMove);
    holdBtn.addEventListener('mouseup', voiceHoldEnd);
    holdBtn.addEventListener('mouseleave', voiceHoldEnd);
  } catch (e) {
    console.error('Voice init error:', e);
    $('voiceToggleBtn').classList.add('unsupported');
  }
}

function toggleVoiceMode() {
  try {
    if (!voiceRecognition) return;
    voiceMode = !voiceMode;
    const area = $('inputArea');
    const icon = $('voiceModeIcon');
    if (voiceMode) {
      area.classList.add('voice-mode');
      icon.outerHTML = KEYBOARD_SVG.replace('<svg', '<svg id="voiceModeIcon"');
      $('voiceToggleBtn').title = 'Switch to keyboard';
    } else {
      area.classList.remove('voice-mode');
      const el = $('voiceModeIcon');
      el.outerHTML = MIC_SVG.replace('<svg', '<svg id="voiceModeIcon"');
      $('voiceToggleBtn').title = 'Switch to voice';
      if (voiceIsListening) voiceRecognition.stop();
    }
  } catch (e) { console.error('Voice mode toggle error:', e); }
}

function voiceHoldStart(e) {
  try {
    if (!voiceRecognition || !voiceMode) return;
    e.preventDefault();
    voiceCancelled = false;
    voiceStartY = e.touches ? e.touches[0].clientY : e.clientY;
    $('voiceHoldBtn').classList.add('holding');
    $('voiceOverlay').classList.remove('cancel-zone');
    $('voiceOverlay').classList.add('active');
    $('voiceOverlayText').textContent = 'Listening...';
    $('input').value = '';
    voiceRecognition.lang = navigator.language || 'zh-CN';
    voiceRecognition.start();
  } catch (e2) { console.error('Voice hold start error:', e2); }
}

function voiceHoldMove(e) {
  try {
    if (!voiceIsListening) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const diff = voiceStartY - y;
    if (diff > 80) {
      $('voiceOverlay').classList.add('cancel-zone');
      $('voiceOverlayText').textContent = 'Release to cancel';
      voiceCancelled = true;
    } else {
      $('voiceOverlay').classList.remove('cancel-zone');
      voiceCancelled = false;
    }
  } catch (e2) { console.error('Voice hold move error:', e2); }
}

function voiceHoldEnd() {
  try {
    $('voiceHoldBtn').classList.remove('holding');
    if (voiceIsListening) {
      voiceRecognition.stop();
      // If not cancelled and has text, auto-send
      if (!voiceCancelled && $('input').value.trim()) {
        setTimeout(() => { sendMessage(); }, 200);
      }
    }
    $('voiceOverlay').classList.remove('active', 'cancel-zone');
  } catch (e) { console.error('Voice hold end error:', e); }
}

document.addEventListener('DOMContentLoaded', initVoiceInput);

function handleFileInput(fileList) {
  if (!fileList || fileList.length === 0) return;
  handleFiles(Array.from(fileList));
  $('fileInput').value = ''; // reset so same file can be re-selected
}

async function handleFiles(files) {
  if (!currentConvId) return;
  const maxFiles = 5;
  const remaining = maxFiles - pendingAttachments.length;
  if (remaining <= 0) { alert('Max 5 attachments per message'); return; }
  const toProcess = files.slice(0, remaining);

  for (const file of toProcess) {
    // Validate size
    if (file.size > 10 * 1024 * 1024) { alert(`${file.name} is too large (max 10MB)`); continue; }

    // Client-side image compression
    let uploadFile = file;
    if (file.type.startsWith('image/') && file.size > 1024 * 1024) {
      try { uploadFile = await compressImage(file); } catch { uploadFile = file; }
    }

    // Create preview element
    const thumbId = 'att_' + Math.random().toString(36).substring(2, 8);
    const thumbEl = document.createElement('div');
    thumbEl.className = 'att-thumb uploading';
    thumbEl.id = thumbId;
    if (file.type.startsWith('image/')) {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      thumbEl.appendChild(img);
    } else {
      const chip = document.createElement('span');
      chip.className = 'att-file-chip';
      chip.innerHTML = `📄 ${esc(file.name)}<span class="att-size">${formatSize(file.size)}</span>`;
      thumbEl.appendChild(chip);
    }
    const removeBtn = document.createElement('button');
    removeBtn.className = 'att-remove';
    removeBtn.innerHTML = '×';
    removeBtn.onclick = () => removeAttachment(thumbId);
    thumbEl.appendChild(removeBtn);
    $('attachmentPreview').appendChild(thumbEl);

    // Upload
    try {
      const formData = new FormData();
      formData.append('conv_id', currentConvId);
      formData.append('file', uploadFile, file.name);
      const resp = await fetch('/api/upload', { method: 'POST', body: formData });
      const results = await resp.json();
      // Server may return {error:"..."} or [{error:"..."}, ...]
      if (!Array.isArray(results)) throw new Error(results.error || 'Upload failed');
      if (!results[0] || results[0].error) throw new Error(results[0]?.error || 'Upload returned empty');
      const att = results[0];
      att._thumbId = thumbId;
      pendingAttachments.push(att);
      thumbEl.classList.remove('uploading');
    } catch (err) {
      thumbEl.remove();
      alert(`Upload failed: ${err.message}`);
    }
  }
}

function removeAttachment(thumbId) {
  const el = document.getElementById(thumbId);
  if (el) el.remove();
  pendingAttachments = pendingAttachments.filter(a => a._thumbId !== thumbId);
}

function clearAttachments() {
  pendingAttachments = [];
  $('attachmentPreview').innerHTML = '';
}

async function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        const MAX_DIM = 1600;
        let w = img.width, h = img.height;
        if (w > MAX_DIM || h > MAX_DIM) {
          const ratio = Math.min(MAX_DIM / w, MAX_DIM / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob((blob) => {
          if (blob) resolve(new File([blob], file.name, { type: 'image/jpeg' }));
          else reject(new Error('compression failed'));
        }, 'image/jpeg', 0.85);
      } catch (e) { reject(e); }
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + 'KB';
  return (bytes / 1024 / 1024).toFixed(1) + 'MB';
}

function renderAttachmentsInBubble(container, attachments) {
  if (!attachments || attachments.length === 0) return;
  const wrap = document.createElement('div');
  wrap.className = 'msg-attachments';
  for (const att of attachments) {
    if (att.category === 'image') {
      const img = document.createElement('img');
      img.src = att.url;
      img.alt = att.filename;
      img.loading = 'lazy';
      img.onclick = () => openLightbox(att.url);
      wrap.appendChild(img);
    } else {
      const a = document.createElement('a');
      a.className = 'msg-att-chip';
      a.href = att.url;
      a.target = '_blank';
      a.innerHTML = `📄 ${esc(att.filename)} <span style="color:var(--text-3);font-size:10px">${formatSize(att.size_bytes)}</span>`;
      wrap.appendChild(a);
    }
  }
  container.appendChild(wrap);
}

function openLightbox(url) {
  const lb = $('lightbox');
  $('lightboxImg').src = url;
  lb.classList.add('open');
}

// ── Chat ──
async function sendMessage() {
  const text = inputEl.value.trim();
  const hasAttachments = pendingAttachments.length > 0;
  if ((!text && !hasAttachments) || isStreaming || !currentConvId) return;
  hideAutocomplete();

  const sendAttachments = [...pendingAttachments];
  userScrolledUp = false; // reset scroll lock on new message
  $('scrollBottomBtn').classList.remove('visible');
  addUserBubble(text, sendAttachments);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  clearAttachments();

  isStreaming = true;
  streamingConvId = currentConvId;
  sendBtn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
  sendBtn.className = 'send-btn stop';
  sendBtn.onclick = stopStreaming;
  setStatus('busy', 'Thinking');

  abortController = new AbortController();
  const bubble = createAssistantBubble();
  const loadingEl = document.createElement('div');
  loadingEl.className = 'loading-indicator';
  loadingEl.innerHTML = '<div class="spinner"></div><span>Thinking...</span>';
  bubble.appendChild(loadingEl);
  scrollToBottom();

  let streamedText = '';
  let lastDeltaNode = null;
  let currentThinkingBlock = null;
  let loadingRemoved = false;
  let assistantMsgId = null;
  let renderTimer = null;
  let lastRenderLen = 0;

  // Throttled markdown render — only re-render when enough new text accumulated or on timer
  function scheduleRender() {
    if (renderTimer) return;
    renderTimer = setTimeout(() => {
      renderTimer = null;
      if (lastDeltaNode && streamedText.length > lastRenderLen) {
        lastDeltaNode.innerHTML = renderMd(streamedText);
        lastRenderLen = streamedText.length;
        scrollToBottom();
      }
    }, 80);
  }
  function flushRender() {
    if (renderTimer) { clearTimeout(renderTimer); renderTimer = null; }
    if (lastDeltaNode && streamedText) {
      lastDeltaNode.innerHTML = renderMd(streamedText);
      lastRenderLen = streamedText.length;
      scrollToBottom();
    }
  }

  function removeLoading() {
    if (loadingRemoved) return;
    loadingEl.remove();
    loadingRemoved = true;
  }

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: currentConvId, prompt: text, attachment_ids: sendAttachments.map(a => a.id) }),
      signal: abortController.signal,
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) { eventType = line.slice(7); }
        else if (line.startsWith('data: ') && eventType) {
          try {
            const data = JSON.parse(line.slice(6));
            // Handle SSE event
            switch (eventType) {
              case 'system':
                if (data.session_id) sessionInfo.textContent = `Session: ${data.session_id.substring(0, 8)}`;
                break;
              case 'delta':
                removeLoading();
                streamedText += data.text;
                if (!lastDeltaNode) { lastDeltaNode = document.createElement('div'); lastDeltaNode.className = 'streamed-text'; bubble.appendChild(lastDeltaNode); }
                scheduleRender();
                break;
              case 'text':
                removeLoading();
                if (lastDeltaNode) {
                  // Finalize the streamed-text div with the complete text
                  streamedText = data.text;
                  flushRender();
                } else if (data.text) {
                  // No streaming happened, render full text block
                  const p = document.createElement('div'); p.className = 'streamed-text'; p.innerHTML = renderMd(data.text); bubble.appendChild(p);
                  scrollToBottom();
                }
                streamedText = ''; lastDeltaNode = null; lastRenderLen = 0;
                break;
              case 'thinking':
                removeLoading();
                if (currentThinkingBlock) { currentThinkingBlock = null; } else { addThinkingBlock(bubble, data.thinking); }
                break;
              case 'thinking_delta':
                removeLoading();
                if (!currentThinkingBlock) { currentThinkingBlock = addThinkingBlock(bubble, ''); }
                currentThinkingBlock.textContent += data.text;
                scrollToBottom();
                break;
              case 'tool_use':
                removeLoading();
                flushRender(); // finalize any pending text before tool block
                setStatus('busy', `Tool: ${data.name}`);
                addToolBlock(bubble, data.name, data.input);
                streamedText = ''; lastDeltaNode = null; lastRenderLen = 0; currentThinkingBlock = null;
                break;
              case 'tool_progress':
                setStatus('busy', `Tool: ${data.tool_name}`);
                break;
              case 'result':
                removeLoading();
                flushRender(); // finalize any pending text
                setStatus('', 'Done');
                if (data.result && !bubble.querySelector('.streamed-text') && bubble.children.length === 0) {
                  const p = document.createElement('div'); p.innerHTML = renderMd(data.result); bubble.appendChild(p);
                }
                if (data.usage) {
                  const t = (data.usage.input_tokens||0) + (data.usage.output_tokens||0);
                  sessionInfo.textContent = `${t.toLocaleString()} tokens`;
                }
                // Mark conversation as having new content
                if (currentConvId) markConvUnread(currentConvId);
                break;
              case 'rate_limit':
                if (data.status === 'rejected' || data.status === 'allowed_warning') {
                  $('rateLimitBanner').style.display = 'block';
                  $('rateLimitBanner').textContent = `Rate limit: ${data.status}`;
                }
                break;
              case 'sub_agent_start':
                removeLoading();
                { const sa = document.createElement('div'); sa.className = 'sub-agent-indicator'; sa.id = 'subAgentPanel';
                  sa.innerHTML = `<strong>🤖 Sub-agents working...</strong> (${data.total} agent${data.total>1?'s':''})`;
                  bubble.appendChild(sa); scrollToBottom(); }
                break;
              case 'sub_agent_delta':
                { const panel = document.getElementById('subAgentPanel');
                  if (panel && data.label) {
                    const icons = { running: '⏳', completed: '✅', failed: '❌' };
                    let agentLine = panel.querySelector(`[data-agent="${data.index}"]`);
                    if (!agentLine) { agentLine = document.createElement('div'); agentLine.dataset.agent = data.index; agentLine.style.cssText = 'margin-top:4px;font-size:12px;'; panel.appendChild(agentLine); }
                    agentLine.innerHTML = `<span class="agent-icon">${data.icon||'🔧'}</span>${esc(data.label)} <span class="agent-status">${icons[data.status]||data.status}${data.duration?' '+Math.round(data.duration/1000)+'s':''}</span>`;
                    scrollToBottom();
                  }
                }
                break;
              case 'sub_agent_done':
                { const panel = document.getElementById('subAgentPanel');
                  if (panel) { panel.querySelector('strong').textContent = `🤖 Sub-agents done (${data.successful}/${data.total} succeeded)`; }
                }
                break;
              case 'done':
                if (data.msg_id) assistantMsgId = data.msg_id;
                break;
              case 'error':
                removeLoading();
                bubble.innerHTML += `<p style="color:#f87171;">${esc(data.message)}</p>`;
                setStatus('error', 'Error');
                break;
            }
          } catch {}
          eventType = null;
        }
      }
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      removeLoading();
      const isNetworkError = err.message.includes('network') || err.message.includes('Failed to fetch') || err.message.includes('Load failed') || err.name === 'TypeError';
      if (isNetworkError) {
        // If page was backgrounded (e.g. iOS app switch), recover silently
        if (document.hidden || wasBackgrounded) {
          wasBackgrounded = false;
          finishStreaming();
          // Silently reload messages to get latest state
          if (currentConvId) selectConversation(currentConvId);
          return;
        }
        bubble.innerHTML += `<p style="color:#f0a030;">Connection lost. Reconnecting...</p>`;
        // Auto-reconnect: poll until server is back
        const reconnect = async () => {
          for (let i = 0; i < 20; i++) {
            await new Promise(r => setTimeout(r, 2000));
            try {
              const r = await fetch('/api/engines', { signal: AbortSignal.timeout(3000) });
              if (r.ok) { location.reload(); return; }
            } catch {}
          }
          bubble.innerHTML += `<p style="color:#f87171;">Server did not come back. <button onclick="location.reload()" style="padding:4px 12px;background:var(--accent);color:white;border:none;border-radius:6px;cursor:pointer;">Retry</button></p>`;
        };
        reconnect();
      } else {
        bubble.innerHTML += `<p style="color:#f87171;">${esc(err.message)}</p>`;
      }
    }
  }

  // Add feedback buttons to the assistant message
  if (assistantMsgId && bubble) {
    addFeedbackButtons(bubble.closest('.message'), assistantMsgId);
  }

  finishStreaming();
  // Refresh conversation list (title may have changed)
  loadConversations();
}

function stopStreaming() { if (abortController) abortController.abort(); finishStreaming(); }
function finishStreaming() {
  isStreaming = false;
  streamingConvId = null;
  sendBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>'; sendBtn.className = 'send-btn'; sendBtn.onclick = sendMessage;
  setStatus('', 'Ready');
  // Remove any lingering loading indicators (e.g. when stop is clicked early)
  try { document.querySelectorAll('.loading-indicator').forEach(el => el.remove()); } catch(e) {}
  inputEl.focus();
}
function setStatus(cls, text) { statusBadge.className = 'status ' + cls; statusBadge.textContent = text; }

function markConvUnread(convId) {
  if (convId === currentConvId && document.hasFocus() && !document.hidden) return;
  unreadConvs.add(convId);
  // Update DOM if item exists
  const item = document.querySelector(`.conv-item[data-conv-id="${convId}"]`);
  if (item) item.classList.add('unread');
  updateMenuDot();
}

function updateMenuDot() {
  const menuBtn = $('menuBtn');
  if (menuBtn) menuBtn.classList.toggle('has-unread', unreadConvs.size > 0);
}
let userScrolledUp = false;
let isAutoScrolling = false;
function scrollToBottom() {
  if (userScrolledUp) return; // respect user's scroll position
  requestAnimationFrame(() => {
    if (userScrolledUp) return; // re-check after frame delay (race condition fix)
    isAutoScrolling = true;
    messagesEl.scrollTop = messagesEl.scrollHeight;
    // Reset flag after scroll event has fired
    requestAnimationFrame(() => { isAutoScrolling = false; });
  });
}
function scrollToBottomManual() {
  userScrolledUp = false;
  isAutoScrolling = true;
  messagesEl.scrollTop = messagesEl.scrollHeight;
  $('scrollBottomBtn').classList.remove('visible');
  requestAnimationFrame(() => { isAutoScrolling = false; });
}
// Detect user scroll: if user scrolls up > 150px from bottom, stop auto-scroll
messagesEl.addEventListener('scroll', () => {
  if (isAutoScrolling) return; // ignore programmatic / DOM-mutation scrolls
  const distFromBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight;
  if (distFromBottom > 150) {
    if (!userScrolledUp && isStreaming) {
      userScrolledUp = true;
      $('scrollBottomBtn').classList.add('visible');
    }
  } else {
    userScrolledUp = false;
    $('scrollBottomBtn').classList.remove('visible');
  }
});
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Bubble helpers ──
function addUserBubble(text, attachments) {
  const w = messagesEl.querySelector('.welcome'); if (w) w.remove();
  const div = document.createElement('div'); div.className = 'message user';
  div.innerHTML = `<button class="msg-copy" onclick="copyMsg(this)">Copy</button><div class="bubble">${text ? esc(text) : ''}</div>`;
  const bubble = div.querySelector('.bubble');
  if (attachments && attachments.length > 0) renderAttachmentsInBubble(bubble, attachments);
  messagesEl.appendChild(div); scrollToBottom();
}
function addAssistantBubble(text) {
  const div = document.createElement('div'); div.className = 'message assistant';
  div.innerHTML = `<button class="msg-copy" onclick="copyMsg(this)">Copy</button><div class="bubble">${renderMd(text)}</div>`;
  messagesEl.appendChild(div);
}
function copyMsg(btn) {
  const bubble = btn.closest('.message').querySelector('.bubble');
  const text = bubble.innerText;
  navigator.clipboard.writeText(text).then(() => {

function addStreamingBubble(partialContent) {
  const div = document.createElement('div'); div.className = 'message assistant';
  const spinnerHtml = '<div class="loading-indicator"><div class="spinner"></div><span>Responding...</span></div>';
  if (partialContent) {
    div.innerHTML = `<div class="bubble">${renderMd(partialContent)}${spinnerHtml}</div>`;
  } else {
    div.innerHTML = `<div class="bubble">${spinnerHtml}</div>`;
  }
  div.dataset.streaming = '1';
  messagesEl.appendChild(div);
  let pollCount = 0;
  const MAX_POLLS = 10; // 10 * 2s = 20 seconds max (page refresh recovery)
  const savedConvId = currentConvId;
  const pollFn = async () => {
    pollCount++;
    if (!currentConvId || currentConvId !== savedConvId || pollCount > MAX_POLLS) {
      clearInterval(poll);
      // Timeout: fetch final state and render whatever is there
      try {
        const msgs = await api('GET', `/api/conversations/${currentConvId}/messages`);
        const last = msgs[msgs.length - 1];
        if (last && last.role === 'assistant' && last.content !== '...') {
          div.querySelector('.bubble').innerHTML = renderMd(last.content.replace('<!-- streaming -->', ''));
        } else {
          div.remove(); // Remove empty bubble
        }
      } catch(e) { div.remove(); }
      delete div.dataset.streaming;
      return;
    }
    try {
      const msgs = await api('GET', `/api/conversations/${currentConvId}/messages`);
      const last = msgs[msgs.length - 1];
      if (!last || last.role !== 'assistant') { clearInterval(poll); div.remove(); return; }
      if (last.content.includes('<!-- streaming -->')) {
        div.querySelector('.bubble').innerHTML = renderMd(last.content.replace('<!-- streaming -->', '')) + spinnerHtml;
        scrollToBottom();
      } else if (last.content !== '...') {
        clearInterval(poll);
        div.querySelector('.bubble').innerHTML = renderMd(last.content);
        delete div.dataset.streaming;
        scrollToBottom();
      }
    } catch(e) { clearInterval(poll); div.remove(); }
  };
  // First poll immediately, then every 2 seconds
  setTimeout(pollFn, 500);
  const poll = setInterval(pollFn, 2000);
}
function createAssistantBubble() {
  const w = messagesEl.querySelector('.welcome'); if (w) w.remove();
  const div = document.createElement('div'); div.className = 'message assistant';

const markedInstance = new marked.Marked({
  gfm: true,
  breaks: false,
  renderer: {
    code({ text, lang }) {
      let highlighted;
      if (lang && hljs.getLanguage(lang)) {
        highlighted = hljs.highlight(text, { language: lang }).value;
      } else {
        highlighted = hljs.highlightAuto(text).value;
      }
      const langLabel = lang ? `<span class="code-lang">${esc(lang)}</span>` : '';
      return `<pre>${langLabel}<button class="code-copy" onclick="copyCode(this)">Copy</button><code class="hljs">${highlighted}</code></pre>`;
    }
  }
});

function renderMd(text) {
  try {
    let html = markedInstance.parse(text);
    html = html.replace(/<table>/g, '<div class="table-wrap"><table>').replace(/<\/table>/g, '</table></div>');
    return html;
  } catch(e) { return text; }
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {

}

    if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, 0); items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx)); return; }
    if ((e.key === 'Tab' || e.key === 'Enter') && selectedIdx >= 0) { e.preventDefault(); pickCmd(items[selectedIdx].dataset.name); return; }
    if (e.key === 'Escape') { e.preventDefault(); hideAutocomplete(); return; }
  }
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); sendMessage(); }
});

// ── Server health check (detect restart and auto-reload) ──
let healthCheckTimer = null;
function startHealthCheck() {
  if (healthCheckTimer) return;
  healthCheckTimer = setInterval(async () => {
    if (isStreaming) return; // don't interfere with active chat
    try {
      const r = await fetch('/api/engines', { signal: AbortSignal.timeout(3000) });
      if (r.status === 401) {
        // Session lost — reload to login
        clearInterval(healthCheckTimer);
        location.reload();
        return;
      }
      if (r.ok) {
        const data = await r.json();
        // Detect server restart by comparing boot timestamp
        if (window._serverBoot && data.server_boot && data.server_boot !== window._serverBoot) {
          console.log('[health] server restarted, reloading...');
          clearInterval(healthCheckTimer);
          location.reload();
        }
      }
    } catch {
      // Server unreachable — it's restarting. Poll until it's back.
      clearInterval(healthCheckTimer);
      healthCheckTimer = null;
      console.log('[health] server unreachable, polling...');
      for (let i = 0; i < 30; i++) {
        await new Promise(r => setTimeout(r, 2000));
        try {
          const r = await fetch('/api/engines', { signal: AbortSignal.timeout(3000) });
          if (r.ok || r.status === 401) { location.reload(); return; }
        } catch {}
      }
    }
  }, 5000);
}
startHealthCheck();

  if (item.type === 'dir') return ART_ICONS.dir;
  const ext = item.name.includes('.') ? item.name.substring(item.name.lastIndexOf('.')).toLowerCase() : '';
  return ART_ICONS[ext] || ART_ICONS.default;

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';

async function loadArtifactsDir(dirPath, container) {
  try {
    const url = dirPath ? `/api/workspace/tree?path=${encodeURIComponent(dirPath)}` : '/api/workspace/tree';
    const data = await api('GET', url);
    if (!data.items || data.items.length === 0) {
      container.innerHTML = '<div style="padding:20px;color:var(--text-3);text-align:center;font-size:13px;">暂无文件</div>';
      return;
    }
    let html = '';
    for (const item of data.items) {
      const icon = artIcon(item);
      const fullPath = dirPath ? dirPath + '/' + item.name : item.name;
      if (item.type === 'dir') {
        html += `<div class="art-item art-dir" data-path="${esc(fullPath)}">
          <div class="art-row" onclick="toggleArtDir(this, '${esc(fullPath)}')">
            <span class="art-icon">${icon}</span>
            <span class="art-name">${esc(item.name)}/</span>
            <span class="art-meta">${item.children_count} 项</span>
            <span class="art-arrow">▶</span>
          </div>
          <div class="art-children" style="display:none;"></div>
        </div>`;
      } else {
        const previewable = /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(item.name);
        const textPreview = /\.(txt|md|csv|json|xml|log)$/i.test(item.name);
        const downloadUrl = '/api/workspace/files/' + encodeURIComponent(fullPath);
        html += `<div class="art-item art-file">
          <div class="art-row">
            <span class="art-icon">${icon}</span>
            <span class="art-name">${esc(item.name)}</span>
            <span class="art-meta">${fmtSize(item.size)} · ${fmtDate(item.mtime)}</span>
            ${previewable ? `<button class="art-btn" onclick="previewArtImage('${esc(downloadUrl)}','${esc(item.name)}')" title="预览">👁</button>` : ''}
            ${textPreview ? `<button class="art-btn" onclick="previewArtText('${esc(downloadUrl)}','${esc(item.name)}')" title="预览">👁</button>` : ''}
            <a class="art-btn" href="${downloadUrl}" download title="下载">⬇</a>
          </div>
        </div>`;
      }
    }
    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = `<div style="padding:20px;color:#f87171;">${esc(err.message)}</div>`;
  }
}

async function toggleArtDir(rowEl, dirPath) {
  const dirEl = rowEl.parentElement;
  const children = dirEl.querySelector('.art-children');
  const arrow = rowEl.querySelector('.art-arrow');
  if (children.style.display === 'none') {
    children.style.display = 'block';
    arrow.textContent = '▼';
    if (!children.dataset.loaded) {
      children.innerHTML = '<div style="padding:8px 16px;color:var(--text-3);font-size:12px;">Loading...</div>';
      await loadArtifactsDir(dirPath, children);
      children.dataset.loaded = '1';

    children.style.display = 'none';
    arrow.textContent = '▶';
  }
}

function openEvolutionPanel() {
  $('evoOverlay').classList.add('open');
  switchEvoTab('knowledge', document.querySelector('.evo-tab'));
  loadPendingBadge();
  loadToolsBadge();
}
function closeEvolutionPanel() { $('evoOverlay').classList.remove('open'); }
function switchEvoTab(tab, el) {
  currentEvoTab = tab;
  document.querySelectorAll('.evo-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  loadEvoTab(tab);
}

async function loadPendingBadge() {
  try {
    const pending = await api('GET', '/api/evolution/pending');
    const badge = $('pendingBadge');
    badge.textContent = pending.length > 0 ? `(${pending.length})` : '';
  } catch {}
}

async function loadEvoTab(tab) {
  const body = $('evoBody');
  body.innerHTML = '<div style="color:var(--text-3);text-align:center;padding:20px;">Loading...</div>';

  try {
    if (tab === 'knowledge') await loadKnowledgeTab(body);
    else if (tab === 'goals') await loadGoalsTab(body);
    else if (tab === 'reflect') await loadReflectTab(body);
    else if (tab === 'pending') await loadPendingTab(body);
    else if (tab === 'stats') await loadStatsTab(body);
    else if (tab === 'agents') await loadAgentsTab(body);
    else if (tab === 'experiments') await loadExperimentsTab(body);
    else if (tab === 'tools') await loadToolsTab(body);
  } catch (err) {
    body.innerHTML = `<p style="color:#f87171;">${esc(err.message)}</p>`;
  }
}

async function loadKnowledgeTab(body) {
  const entries = await api('GET', '/api/knowledge');
  if (!entries.length) {
    body.innerHTML = '<div style="color:var(--text-3);text-align:center;padding:40px;">No knowledge yet. Run a reflection to start learning!</div>';
    return;
  }
  const categories = {};
  for (const e of entries) {
    if (!categories[e.category]) categories[e.category] = [];
    categories[e.category].push(e);
  }
  let html = '';
  for (const [cat, items] of Object.entries(categories)) {
    html += `<div class="evo-section"><h3>${esc(cat.charAt(0).toUpperCase() + cat.slice(1))} (${items.length})</h3>`;
    for (const item of items) {
      html += `<div class="k-entry" id="k-${item.id}" onclick="toggleKEntry(${item.id})">
        <div class="k-entry-header">
          <div>
            <div class="k-entry-title">${esc(item.title)}</div>
            <div class="k-entry-meta">Tags: ${esc(item.tags || 'none')} · Confidence: ${(item.confidence || 0).toFixed(1)} · ${item.source_type}</div>
          </div>
          <div class="k-entry-actions" onclick="event.stopPropagation()">
            <button onclick="evalKEntry(${item.id}, this)" title="Run evaluation">📊</button>
            <button onclick="deleteKEntry(${item.id})">🗑️</button>
          </div>
        </div>
        <div class="k-entry-content" id="k-content-${item.id}">Loading...</div>
      </div>`;
    }
    html += '</div>';
  }
  body.innerHTML = html;
}

async function toggleKEntry(id) {
  const el = document.getElementById(`k-${id}`);
  const contentEl = document.getElementById(`k-content-${id}`);
  el.classList.toggle('expanded');
  if (el.classList.contains('expanded') && contentEl.textContent === 'Loading...') {
    try {
      const data = await api('GET', `/api/knowledge/${id}`);
      contentEl.textContent = data.content || '(empty)';
    } catch { contentEl.textContent = 'Failed to load'; }
  }
}

async function deleteKEntry(id) {
  if (!confirm('Delete this knowledge entry?')) return;
  await api('DELETE', `/api/knowledge/${id}`);
  loadEvoTab('knowledge');
}

async function evalKEntry(id, btn) {
  const orig = btn.textContent;
  btn.textContent = '⏳';
  btn.disabled = true;
  try {
    const res = await api('POST', '/api/evaluations/run', { knowledge_id: id });
    btn.textContent = res.status === 'passed' ? '✅' : res.status === 'failed' ? '⚠️' : '✔️';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
  } catch (err) {
    btn.textContent = '❌';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
  }
}

async function loadGoalsTab(body) {
  const data = await api('GET', '/api/goals');
  body.innerHTML = `
    <div class="evo-section">
      <h3>Growth Goals</h3>
      <p style="font-size:12px;color:var(--text-3);margin-bottom:8px;">Define what your daemon should learn and improve on. This guides the reflection process.</p>
      <textarea class="goals-editor" id="goalsEditor">${esc(data.content || '')}</textarea>
      <div style="margin-top:10px;display:flex;gap:8px;">
        <button class="evo-action-btn" onclick="saveGoals()">Save Goals</button>
      </div>
    </div>`;
}

async function saveGoals() {
  const content = $('goalsEditor').value;
  await api('PUT', '/api/goals', { content });
  alert('Goals saved!');
}

  // Build engine options
  const engineOpts = engines.map(e => `<option value="${e.id}">${esc(e.label)}</option>`).join('');

  body.innerHTML = `
    <div class="evo-section">
      <h3>Run Reflection</h3>
      <p style="font-size:12px;color:var(--text-3);margin-bottom:12px;">
        Strategy: <strong>${esc(status.strategy)}</strong> · Last reflection: <strong>${lastReflect}</strong>
      </p>

let reflectPreviewTimeout = null;
function updateReflectPreview() {
  clearTimeout(reflectPreviewTimeout);
  reflectPreviewTimeout = setTimeout(async () => {
    const previewEl = $('reflectPreview');
    if (!previewEl) return;
    const range = $('reflectRange')?.value || 'last';
    const limit = parseInt($('reflectLimit')?.value || '50');
    let since = null;
    if (range === '7d') since = Date.now() - 7 * 86400000;
    else if (range === '30d') since = Date.now() - 30 * 86400000;
    else if (range === 'all') since = 0;
    // 'last' → null means since last reflection

    try {
      const data = await api('POST', '/api/reflect/preview', { since, limit });
      if (data.trace_count === 0) {
        previewEl.innerHTML = '⚠️ No traces found for this range. Try a different time range.';
        $('reflectBtn').disabled = true;
      } else {
        const s = data.summary;
        previewEl.innerHTML = `Will analyze <strong>${s.total}</strong> conversations
          (👍 ${s.good_feedback} · 👎 ${s.bad_feedback} · no feedback: ${s.no_feedback})
          · ~${(s.total_tokens / 1000).toFixed(1)}k tokens in traces`;
        $('reflectBtn').disabled = false;
      }
    } catch {
      previewEl.innerHTML = 'Failed to load preview';
    }
  }, 300);
}

async function runReflection() {
  const btn = $('reflectBtn');
  btn.disabled = true;
  btn.textContent = 'Reflecting...';
  const outputEl = $('reflectOutput');
  outputEl.innerHTML = '<div class="reflect-output" id="reflectStream"></div>';
  const streamEl = $('reflectStream');

  const engineId = $('reflectEngine')?.value || engines[0]?.id;
  const range = $('reflectRange')?.value || 'last';
  const limit = parseInt($('reflectLimit')?.value || '50');
  let since = null;
  if (range === '7d') since = Date.now() - 7 * 86400000;
  else if (range === '30d') since = Date.now() - 30 * 86400000;
  else if (range === 'all') since = 0;

  try {
    const res = await fetch('/api/reflect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ engine_id: engineId, limit, since }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';
    let doneData = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) eventType = line.slice(7);
        else if (line.startsWith('data: ') && eventType) {
          try {
            const data = JSON.parse(line.slice(6));
            if (eventType === 'delta') {
              fullText += data.text;
              streamEl.textContent = fullText;
              streamEl.scrollTop = streamEl.scrollHeight;
            } else if (eventType === 'done') {
              doneData = data;
            } else if (eventType === 'error') {
              outputEl.innerHTML += `<p style="color:#f87171;">${esc(data.message)}</p>`;
            }
          } catch {}
          eventType = null;
        }
      }
    }

    // Show inline insights + accept/reject
    if (doneData) {
      let resultHtml = `<div style="margin-top:12px;padding:10px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;">
        <div style="font-size:13px;color:var(--text-2);margin-bottom:10px;">
          <strong>${doneData.insight_count}</strong> insights found ·
          <span style="color:#4ade80;">${doneData.auto_accepted} auto-accepted</span> ·
          <span style="color:#facc15;">${doneData.pending} pending review</span>
        </div>`;

      if (doneData.pending > 0) {
        // Load pending insights and show inline
        const pending = await api('GET', '/api/evolution/pending');
        for (const p of pending) {
          resultHtml += `<div class="insight-card" id="reflect-insight-${p.id}">
            <span class="badge ${p.category}">${p.category}</span>
            <strong style="margin-left:8px;">${esc(p.title)}</strong>
            <span style="color:var(--text-3);font-size:11px;margin-left:6px;">confidence: ${(p.confidence || 0).toFixed(2)}</span>
            <div style="margin-top:6px;font-size:13px;color:var(--text-2);">${esc(p.content)}</div>
            <div class="insight-actions">
              <button class="btn-accept" onclick="acceptInsightInline(${p.id})">✓ Accept</button>
              <button class="btn-reject" onclick="rejectInsightInline(${p.id})">✗ Reject</button>
            </div>
          </div>`;
        }
      }
      resultHtml += '</div>';
      outputEl.innerHTML += resultHtml;
      loadPendingBadge();
    }
  } catch (err) {
    outputEl.innerHTML += `<p style="color:#f87171;">${esc(err.message)}</p>`;
  }

  btn.disabled = false;
  btn.textContent = 'Start Reflection';
}

  try {
    const name = $('expName').value.trim();
    const surface = $('expSurface').value;
    const variantA = $('expVarA').value;
    const variantB = $('expVarB').value;
    const minConversations = parseInt($('expMinConvs').value) || 20;
    if (!name || !variantA || !variantB) { alert('All fields required'); return; }
    await api('POST', '/api/experiments', { name, surface, variantA, variantB, minConversations });
    loadEvoTab('experiments');
  } catch (err) { alert(err.message); }
}

async function decideExperiment(id, winner) {
  if (!confirm(`Declare Variant ${winner} as winner?`)) return;
  try {
    await api('POST', `/api/experiments/${id}/decide`, { winner });
    loadEvoTab('experiments');
  } catch (err) { alert(err.message); }
}

async function cancelExperiment(id) {
  if (!confirm('Cancel this experiment?')) return;
  try {
    await api('DELETE', `/api/experiments/${id}`);
    loadEvoTab('experiments');
  } catch (err) { alert(err.message); }
}

// ── Phase 4: Self-Coded Tools Tab ──
async function loadToolsTab(body) {
  try {
    const tools = await api('GET', '/api/self-coded-tools');
    let html = `<div class="evo-section">
      <h3>Self-Coded Tools</h3>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:12px;">
        Tools auto-proposed by the reflection system when it detects repeating patterns that could be automated.
      </div>
    </div>`;

    if (tools.length === 0) {
      html += `<div class="p4-empty">No self-coded tools yet. The system will propose tools when it detects automation opportunities during reflection.</div>`;
    } else {
      for (const tool of tools) {
        html += `<div class="p4-card">
          <div class="p4-card-header">
            <span class="p4-card-title">🔧 ${esc(tool.tool_name)}</span>
            <span class="p4-status ${tool.status}">${esc(tool.status)}</span>
          </div>
          <div class="p4-card-meta">${esc(tool.description||'No description')}</div>
          ${tool.origin_pattern ? `<div style="font-size:11px;color:var(--text-3);margin-top:4px;">Pattern: ${esc(tool.origin_pattern.substring(0,100))}</div>` : ''}
          ${tool.code ? `<details style="margin-top:8px;"><summary style="font-size:12px;color:var(--text-2);cursor:pointer;">View Code</summary><div class="p4-code">${esc(tool.code)}</div></details>` : ''}
          ${tool.test_result ? `<div style="font-size:11px;color:var(--text-3);margin-top:4px;">Validation: ${esc(tool.test_result.substring(0,100))}</div>` : ''}
          <div class="p4-actions">
            ${tool.status === 'proposed' || tool.status === 'generated' || tool.status === 'validated' ? `<button class="p4-btn success" onclick="approveTool(${tool.id})">Approve & Install</button><button class="p4-btn danger" onclick="rejectTool(${tool.id})">Reject</button>` : ''}
            ${tool.status === 'installed' ? `<button class="p4-btn danger" onclick="disableTool(${tool.id})">Disable</button>` : ''}
            ${tool.status === 'disabled' ? `<button class="p4-btn success" onclick="enableTool(${tool.id})">Re-enable</button>` : ''}
          </div>
        </div>`;
      }
    }

    body.innerHTML = html;
  } catch (err) {
    body.innerHTML = `<p style="color:#f87171;">${esc(err.message)}</p>`;
  }
}

async function runNextEval(btn) {
  const orig = btn.textContent;
  btn.textContent = 'Running...';
  btn.disabled = true;
  try {
    const res = await api('POST', '/api/evaluations/run');
    btn.textContent = res.status ? `Done: ${res.status}` : 'Done';

    const proposed = tools.filter(t => t.status === 'proposed' || t.status === 'generated' || t.status === 'validated').length;

    if (badge) badge.textContent = proposed > 0 ? `(${proposed})` : '';
  } catch {}
