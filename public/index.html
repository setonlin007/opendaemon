<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>OpenDaemon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f1a;
  --sidebar-bg: #1a1a2e;
  --chat-bg: #0f0f1a;
  --border: #2a2a4a;
  --text: #e0e0e0;
  --text-2: #a0a0b0;
  --text-3: #555;
  --user-bg: #0f3460;
  --accent: #e94560;
  --accent-2: #533483;
  --input-bg: #16213e;
  --code-bg: #0d1117;
  --tool-bg: #1e2a3a;
  --hover: rgba(255,255,255,0.05);
  --active: rgba(255,255,255,0.1);
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; height: 100dvh; display: flex; overflow: hidden; }

/* ── Sidebar ── */
.sidebar { width: 260px; min-width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.sidebar-header { padding: 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 15px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.btn-new { padding: 6px 14px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-new:hover { opacity: 0.85; }

.engine-select { padding: 8px 16px; }
.engine-select select { width: 100%; padding: 8px 10px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; }

.conv-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.conv-group-label { padding: 8px 12px 4px; font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.conv-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 1px; }
.conv-item:hover { background: var(--hover); }
.conv-item.active { background: var(--active); }
.conv-icon { width: 22px; height: 22px; border-radius: 6px; background: var(--accent-2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.conv-title { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.conv-del { display: none; width: 22px; height: 22px; border: none; background: none; cursor: pointer; color: var(--text-3); border-radius: 4px; font-size: 14px; flex-shrink: 0; align-items: center; justify-content: center; }
.conv-item:hover .conv-del { display: flex; }
.conv-del:hover { color: var(--accent); background: rgba(233,69,96,0.1); }

.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-3); display: flex; justify-content: space-between; }
.sidebar-footer a { color: var(--text-3); text-decoration: none; }
.sidebar-footer a:hover { color: var(--accent); }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

.chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--sidebar-bg); }
.chat-header .engine-label { font-size: 14px; font-weight: 600; }
.chat-header .status { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #1a3a1a; color: #4ade80; }
.chat-header .status.busy { background: #3a3a1a; color: #facc15; }
.chat-header .status.error { background: #3a1a1a; color: #f87171; }
.chat-header .session-info { font-size: 11px; color: var(--text-3); font-family: monospace; }

.messages { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
.message { margin-bottom: 20px; max-width: 900px; margin-left: auto; margin-right: auto; }
.message.user { display: flex; justify-content: flex-end; }
.message.user .bubble { background: var(--user-bg); border-radius: 16px 16px 4px 16px; padding: 10px 16px; max-width: 75%; white-space: pre-wrap; word-break: break-word; }
.message.assistant .bubble { line-height: 1.6; }

.welcome { text-align: center; color: var(--text-3); margin-top: 30vh; font-size: 14px; }

/* Code & markdown */
.message pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; font-size: 13px; line-height: 1.5; }
.message code { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; }
.message :not(pre) > code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); }
.bubble strong { font-weight: 600; }
.bubble h1,.bubble h2,.bubble h3 { margin: 12px 0 6px; }
.bubble h1 { font-size: 18px; } .bubble h2 { font-size: 16px; } .bubble h3 { font-size: 14px; }
.bubble ul,.bubble ol { padding-left: 20px; margin: 6px 0; }
.bubble blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--text-2); margin: 8px 0; }
.bubble table { border-collapse: collapse; margin: 8px 0; width: 100%; }
.bubble th,.bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-size: 13px; }
.bubble th { background: var(--tool-bg); }

/* Tool blocks */
.tool-block { background: var(--tool-bg); border: 1px solid var(--border); border-radius: 8px; margin: 8px 0; overflow: hidden; }
.tool-header { padding: 6px 12px; font-size: 12px; font-weight: 600; color: var(--accent); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
.tool-header::before { content: "\25B6"; font-size: 10px; margin-right: 6px; transition: transform 0.2s; display: inline-block; }
.tool-block.expanded .tool-header::before { transform: rotate(90deg); }
.tool-body { display: none; padding: 8px 12px; font-size: 12px; color: var(--text-2); font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
.tool-block.expanded .tool-body { display: block; }

/* Thinking */
.thinking-block { border-left: 3px solid var(--accent-2); padding: 8px 12px; margin: 8px 0; border-radius: 0 8px 8px 0; font-size: 13px; color: var(--text-2); white-space: pre-wrap; max-height: 40px; overflow: hidden; cursor: pointer; position: relative; }
.thinking-block::after { content: "... click to expand"; position: absolute; bottom: 0; right: 0; padding: 2px 8px; background: var(--bg); color: var(--text-3); font-size: 11px; }
.thinking-block.expanded { max-height: 300px; overflow-y: auto; }
.thinking-block.expanded::after { display: none; }

/* Loading */
.loading-indicator { display: flex; align-items: center; gap: 8px; color: var(--text-3); font-size: 13px; padding: 4px 0; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Rate limit */
.rate-limit-banner { display: none; padding: 8px 20px; background: #3a2a00; color: #facc15; font-size: 12px; text-align: center; }

/* Input */
.input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--sidebar-bg); }
.input-row { max-width: 900px; margin: 0 auto; display: flex; gap: 8px; align-items: flex-end; }
.input-wrapper { position: relative; flex: 1; }
.input-wrapper textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: inherit; resize: none; min-height: 44px; max-height: 200px; outline: none; }
.input-wrapper textarea:focus { border-color: var(--accent); }
.input-row button { background: var(--accent); color: white; border: none; border-radius: 12px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.input-row button:hover { opacity: 0.85; }
.input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
.input-row button.stop { background: #dc3545; }
.input-hint { max-width: 900px; margin: 6px auto 0; font-size: 11px; color: var(--text-3); text-align: center; }

/* Autocomplete */
.autocomplete { display: none; position: absolute; bottom: 100%; left: 0; right: 0; max-height: 260px; overflow-y: auto; background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; box-shadow: 0 -4px 16px rgba(0,0,0,0.4); z-index: 100; }
.autocomplete.visible { display: block; }
.autocomplete-item { padding: 8px 14px; cursor: pointer; display: flex; align-items: baseline; gap: 10px; border-bottom: 1px solid var(--border); }
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:hover,.autocomplete-item.selected { background: var(--active); }
.autocomplete-item .cmd-name { font-weight: 600; color: var(--accent); font-size: 13px; white-space: nowrap; }
.autocomplete-item .cmd-desc { font-size: 12px; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Mobile hamburger ── */
.menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 4px 8px; line-height: 1; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }

/* ── Mobile responsive ── */
@media (max-width: 768px) {
  body { position: relative; }
  .sidebar { position: fixed; left: 0; top: 0; z-index: 100; transform: translateX(-100%); transition: transform 0.25s ease; width: 280px; min-width: 280px; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.visible { display: block; }
  .menu-btn { display: block; }
  .main { width: 100%; }
  .messages { padding: 12px; }
  .message.user .bubble { max-width: 90%; }
  .input-area { padding: 10px 12px; }
  .input-hint { display: none; }
  .input-row button { padding: 10px 14px; }
  .chat-header { padding: 10px 12px; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>OpenDaemon</h1>
    <button class="btn-new" onclick="newChat()">+ New</button>
  </div>
  <div class="engine-select">
    <select id="engineSelect"></select>
  </div>
  <div class="conv-list" id="convList"></div>
  <div class="sidebar-footer">
    <span>v0.1.0</span>
    <a href="/api/logout">Logout</a>
  </div>
</aside>

<!-- Mobile overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Main -->
<main class="main">
  <div class="chat-header">
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">&#9776;</button>
      <span class="engine-label" id="engineLabel">Select an engine</span>
      <span class="session-info" id="sessionInfo"></span>
    </div>
    <span class="status" id="statusBadge">Ready</span>
  </div>
  <div class="rate-limit-banner" id="rateLimitBanner"></div>
  <div class="messages" id="messages">
    <div class="welcome">Select or create a conversation to start</div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <div class="autocomplete" id="autocomplete"></div>
        <textarea id="input" placeholder="Message OpenDaemon..." rows="1" disabled></textarea>
      </div>
      <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>
    <div class="input-hint">Enter to send, Shift+Enter for newline</div>
  </div>
</main>

<script>
// ── State ──
let engines = [];
let conversations = [];
let currentConvId = null;
let currentEngine = null;
let isStreaming = false;
let abortController = null;
let allCommands = [];
let wasBackgrounded = false;

const $ = (id) => document.getElementById(id);
const messagesEl = $('messages');
const inputEl = $('input');
const sendBtn = $('sendBtn');
const engineSelect = $('engineSelect');
const convList = $('convList');
const statusBadge = $('statusBadge');
const sessionInfo = $('sessionInfo');
const autocompleteEl = $('autocomplete');

// ── Init ──
async function init() {
  try {
    engines = await api('GET', '/api/engines');
    engineSelect.innerHTML = engines.map(e =>
      `<option value="${e.id}">${e.icon ? e.icon + ' ' : ''}${e.label}</option>`
    ).join('');
    await loadConversations();
    loadCommands();
    // Auto-select the most recent conversation
    if (conversations.length > 0 && !currentConvId) {
      selectConversation(conversations[0].id);
    }
  } catch (err) {
    if (err.message.includes('401') || err.message.includes('unauthorized')) {
      window.location.href = '/login.html';
    }
  }
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(path, opts);
  if (res.status === 401) throw new Error('unauthorized');
  if (!res.ok) { const d = await res.json().catch(() => ({})); throw new Error(d.error || res.statusText); }
  return res.json();
}

// ── Conversations ──
async function loadConversations() {
  conversations = await api('GET', '/api/conversations');
  renderConversations();
}

function renderConversations() {
  if (conversations.length === 0) {
    convList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-3);font-size:13px;">No conversations yet</div>';
    return;
  }
  const now = Date.now();
  const dayMs = 86400000;
  const todayStart = new Date().setHours(0,0,0,0);
  const groups = { today: [], yesterday: [], earlier: [] };
  for (const c of conversations) {
    if (c.updated_at >= todayStart) groups.today.push(c);
    else if (c.updated_at >= todayStart - dayMs) groups.yesterday.push(c);
    else groups.earlier.push(c);
  }

  let html = '';
  const renderGroup = (label, items) => {
    if (items.length === 0) return '';
    let h = `<div class="conv-group-label">${label}</div>`;
    for (const c of items) {
      const eng = engines.find(e => e.id === c.engine_id);
      const icon = eng?.icon || '?';
      const active = c.id === currentConvId ? ' active' : '';
      h += `<div class="conv-item${active}" onclick="selectConversation('${c.id}')">
        <div class="conv-icon">${esc(icon)}</div>
        <div class="conv-title">${esc(c.title)}</div>
        <button class="conv-del" onclick="event.stopPropagation();deleteConv('${c.id}')">&times;</button>
      </div>`;
    }
    return h;
  };
  html += renderGroup('Today', groups.today);
  html += renderGroup('Yesterday', groups.yesterday);
  html += renderGroup('Earlier', groups.earlier);
  convList.innerHTML = html;
}

async function newChat() {
  const engineId = engineSelect.value;
  const conv = await api('POST', '/api/conversations', { engine_id: engineId });
  conversations.unshift(conv);
  renderConversations();
  selectConversation(conv.id);
}

async function selectConversation(id) {
  currentConvId = id;
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  currentEngine = engines.find(e => e.id === conv.engine_id);
  $('engineLabel').textContent = currentEngine?.label || conv.engine_id;
  closeSidebar();
  sessionInfo.textContent = '';
  inputEl.disabled = false;
  sendBtn.disabled = false;
  renderConversations();

  // Load messages
  const msgs = await api('GET', `/api/conversations/${id}/messages`);
  messagesEl.innerHTML = '';
  if (msgs.length === 0) {
    messagesEl.innerHTML = '<div class="welcome">Start a conversation</div>';
  } else {
    for (const m of msgs) {
      if (m.role === 'user') addUserBubble(m.content);
      else addAssistantBubble(m.content);
    }
    scrollToBottom();
  }
}

async function deleteConv(id) {
  await api('DELETE', `/api/conversations/${id}`);
  conversations = conversations.filter(c => c.id !== id);
  if (currentConvId === id) {
    currentConvId = null;
    currentEngine = null;
    messagesEl.innerHTML = '<div class="welcome">Select or create a conversation to start</div>';
    inputEl.disabled = true;
    sendBtn.disabled = true;
    $('engineLabel').textContent = 'Select an engine';
  }
  renderConversations();
}

// ── Chat ──
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isStreaming || !currentConvId) return;
  hideAutocomplete();

  addUserBubble(text);
  inputEl.value = '';
  inputEl.style.height = 'auto';

  isStreaming = true;
  sendBtn.textContent = 'Stop';
  sendBtn.className = 'stop';
  sendBtn.onclick = stopStreaming;
  setStatus('busy', 'Thinking');

  abortController = new AbortController();
  const bubble = createAssistantBubble();
  const loadingEl = document.createElement('div');
  loadingEl.className = 'loading-indicator';
  loadingEl.innerHTML = '<div class="spinner"></div><span>Thinking...</span>';
  bubble.appendChild(loadingEl);
  scrollToBottom();

  let streamedText = '';
  let lastDeltaNode = null;
  let currentThinkingBlock = null;
  let loadingRemoved = false;

  function removeLoading() {
    if (loadingRemoved) return;
    loadingEl.remove();
    loadingRemoved = true;
  }

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: currentConvId, prompt: text }),
      signal: abortController.signal,
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let eventType = null;
      for (const line of lines) {
        if (line.startsWith('event: ')) { eventType = line.slice(7); }
        else if (line.startsWith('data: ') && eventType) {
          try {
            const data = JSON.parse(line.slice(6));
            // Handle SSE event
            switch (eventType) {
              case 'system':
                if (data.session_id) sessionInfo.textContent = `Session: ${data.session_id.substring(0, 8)}`;
                break;
              case 'delta':
                removeLoading();
                streamedText += data.text;
                if (!lastDeltaNode) { lastDeltaNode = document.createElement('div'); lastDeltaNode.className = 'streamed-text'; bubble.appendChild(lastDeltaNode); }
                lastDeltaNode.innerHTML = renderMd(streamedText);
                scrollToBottom();
                break;
              case 'text':
                removeLoading();
                if (!streamedText) { const p = document.createElement('div'); p.innerHTML = renderMd(data.text); bubble.appendChild(p); scrollToBottom(); }
                streamedText = ''; lastDeltaNode = null;
                break;
              case 'thinking':
                removeLoading();
                if (currentThinkingBlock) { currentThinkingBlock = null; } else { addThinkingBlock(bubble, data.thinking); }
                break;
              case 'thinking_delta':
                removeLoading();
                if (!currentThinkingBlock) { currentThinkingBlock = addThinkingBlock(bubble, ''); }
                currentThinkingBlock.textContent += data.text;
                scrollToBottom();
                break;
              case 'tool_use':
                removeLoading();
                setStatus('busy', `Tool: ${data.name}`);
                addToolBlock(bubble, data.name, data.input);
                streamedText = ''; lastDeltaNode = null; currentThinkingBlock = null;
                break;
              case 'tool_progress':
                setStatus('busy', `Tool: ${data.tool_name}`);
                break;
              case 'result':
                removeLoading();
                setStatus('', 'Done');
                if (data.result && !bubble.querySelector('.streamed-text') && bubble.children.length === 0) {
                  const p = document.createElement('div'); p.innerHTML = renderMd(data.result); bubble.appendChild(p);
                }
                if (data.usage) {
                  const t = (data.usage.input_tokens||0) + (data.usage.output_tokens||0);
                  sessionInfo.textContent = `${t.toLocaleString()} tokens`;
                }
                break;
              case 'rate_limit':
                if (data.status === 'rejected' || data.status === 'allowed_warning') {
                  $('rateLimitBanner').style.display = 'block';
                  $('rateLimitBanner').textContent = `Rate limit: ${data.status}`;
                }
                break;
              case 'error':
                removeLoading();
                bubble.innerHTML += `<p style="color:#f87171;">${esc(data.message)}</p>`;
                setStatus('error', 'Error');
                break;
            }
          } catch {}
          eventType = null;
        }
      }
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      removeLoading();
      const isNetworkError = err.message.includes('network') || err.message.includes('Failed to fetch') || err.message.includes('Load failed') || err.name === 'TypeError';
      if (isNetworkError) {
        // If page was backgrounded (e.g. iOS app switch), recover silently
        if (document.hidden || wasBackgrounded) {
          wasBackgrounded = false;
          finishStreaming();
          // Silently reload messages to get latest state
          if (currentConvId) selectConversation(currentConvId);
          return;
        }
        bubble.innerHTML += `<p style="color:#f0a030;">Connection lost. Reconnecting...</p>`;
        // Auto-reconnect: poll until server is back
        const reconnect = async () => {
          for (let i = 0; i < 20; i++) {
            await new Promise(r => setTimeout(r, 2000));
            try {
              const r = await fetch('/api/engines', { signal: AbortSignal.timeout(3000) });
              if (r.ok) { location.reload(); return; }
            } catch {}
          }
          bubble.innerHTML += `<p style="color:#f87171;">Server did not come back. <button onclick="location.reload()" style="padding:4px 12px;background:var(--accent);color:white;border:none;border-radius:6px;cursor:pointer;">Retry</button></p>`;
        };
        reconnect();
      } else {
        bubble.innerHTML += `<p style="color:#f87171;">${esc(err.message)}</p>`;
      }
    }
  }

  finishStreaming();
  // Refresh conversation list (title may have changed)
  loadConversations();
}

function stopStreaming() { if (abortController) abortController.abort(); finishStreaming(); }
function finishStreaming() {
  isStreaming = false;
  sendBtn.textContent = 'Send'; sendBtn.className = ''; sendBtn.onclick = sendMessage;
  if (statusBadge.textContent === 'Thinking') setStatus('', 'Ready');
  inputEl.focus();
}
function setStatus(cls, text) { statusBadge.className = 'status ' + cls; statusBadge.textContent = text; }
function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Bubble helpers ──
function addUserBubble(text) {
  const w = messagesEl.querySelector('.welcome'); if (w) w.remove();
  const div = document.createElement('div'); div.className = 'message user';
  div.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  messagesEl.appendChild(div); scrollToBottom();
}
function addAssistantBubble(text) {
  const div = document.createElement('div'); div.className = 'message assistant';
  div.innerHTML = `<div class="bubble">${renderMd(text)}</div>`;
  messagesEl.appendChild(div);
}
function createAssistantBubble() {
  const w = messagesEl.querySelector('.welcome'); if (w) w.remove();
  const div = document.createElement('div'); div.className = 'message assistant';
  div.innerHTML = '<div class="bubble"></div>';
  messagesEl.appendChild(div);
  return div.querySelector('.bubble');
}
function addToolBlock(bubble, name, input) {
  let summary = name;
  if (input?.file_path) summary += `: ${input.file_path}`;
  else if (input?.command) summary += `: ${input.command.substring(0, 60)}`;
  else if (input?.pattern) summary += `: ${input.pattern}`;
  const block = document.createElement('div'); block.className = 'tool-block';
  block.innerHTML = `<div class="tool-header" onclick="this.parentElement.classList.toggle('expanded')">${esc(summary)}</div><div class="tool-body">${esc(JSON.stringify(input, null, 2))}</div>`;
  bubble.appendChild(block); scrollToBottom();
}
function addThinkingBlock(bubble, text) {
  const block = document.createElement('div'); block.className = 'thinking-block';
  block.textContent = text;
  block.onclick = () => block.classList.toggle('expanded');
  bubble.appendChild(block); scrollToBottom();
  return block;
}

// ── Markdown ──
function renderMd(text) {
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${esc(code.trim())}</code></pre>`);
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
  text = text.replace(/\n\n/g, '</p><p>');
  return '<p>' + text + '</p>';
}

// ── Autocomplete ──
let selectedIdx = -1;
async function loadCommands() {
  try {
    const data = await api('GET', '/api/commands');
    allCommands = (data.commands || []).map(c => ({ name: '/' + c.name, desc: (c.description || '').split('\n')[0].substring(0, 80) }));
  } catch {}
}
function handleInput() {
  const val = inputEl.value;
  if (val.startsWith('/') && !val.includes('\n') && currentEngine?.type === 'claude-sdk') {
    const matches = allCommands.filter(c => c.name.toLowerCase().startsWith(val.toLowerCase()));
    if (matches.length > 0) {
      selectedIdx = -1;
      autocompleteEl.innerHTML = matches.map((item, i) =>
        `<div class="autocomplete-item" data-name="${esc(item.name)}" onmousedown="pickCmd('${esc(item.name)}')">
          <span class="cmd-name">${esc(item.name)}</span>
          <span class="cmd-desc">${esc(item.desc)}</span>
        </div>`
      ).join('');
      autocompleteEl.classList.add('visible');
      return;
    }
  }
  hideAutocomplete();
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
}
function hideAutocomplete() { autocompleteEl.classList.remove('visible'); selectedIdx = -1; }
function pickCmd(name) { inputEl.value = name + ' '; inputEl.focus(); hideAutocomplete(); }

inputEl.addEventListener('input', handleInput);
inputEl.addEventListener('keydown', (e) => {
  const isOpen = autocompleteEl.classList.contains('visible');
  if (isOpen) {
    const items = autocompleteEl.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx + 1, items.length - 1); items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx)); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, 0); items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx)); return; }
    if ((e.key === 'Tab' || e.key === 'Enter') && selectedIdx >= 0) { e.preventDefault(); pickCmd(items[selectedIdx].dataset.name); return; }
    if (e.key === 'Escape') { e.preventDefault(); hideAutocomplete(); return; }
  }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Mobile sidebar ──
const sidebarEl = document.querySelector('.sidebar');
const overlayEl = $('sidebarOverlay');
function toggleSidebar() { sidebarEl.classList.toggle('open'); overlayEl.classList.toggle('visible'); }
function closeSidebar() { sidebarEl.classList.remove('open'); overlayEl.classList.remove('visible'); }

// ── Background/foreground detection (iOS app switch) ──
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    wasBackgrounded = true;
  } else {
    // Came back from background
    if (wasBackgrounded && !isStreaming && currentConvId) {
      // Not streaming: silently refresh current conversation
      wasBackgrounded = false;
      selectConversation(currentConvId);
    }
    // If streaming, wasBackgrounded stays true so the SSE error handler
    // will pick it up and recover silently instead of showing reconnect UI
  }
});



// ── Start ──
init();
</script>
