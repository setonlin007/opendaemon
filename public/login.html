<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenDaemon - Login</title>
<script src="i18n.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  width: 360px;
  padding: 40px;
  background: #1a1a2e;
  border-radius: 16px;
  border: 1px solid #2a2a4a;
}
.login-box h1 {
  font-size: 24px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #e94560, #533483);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.login-box p { font-size: 13px; color: #666; margin-bottom: 24px; }
.login-box input {
  width: 100%;
  padding: 12px 16px;
  background: #16213e;
  border: 1px solid #2a2a4a;
  border-radius: 10px;
  color: #e0e0e0;
  font-size: 14px;
  outline: none;
  margin-bottom: 16px;
}
.login-box input:focus { border-color: #e94560; }
.login-box button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #e94560, #533483);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.login-box button:hover { opacity: 0.9; }
.login-box button:disabled { opacity: 0.5; cursor: not-allowed; }
.error { color: #f87171; font-size: 13px; margin-top: 12px; display: none; }
.lang-switch { position: fixed; top: 16px; right: 16px; background: none; border: 1px solid #2a2a4a; color: #a0a0b0; padding: 4px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }
.lang-switch:hover { border-color: #e94560; color: #e94560; }
</style>
</head>
<body>
<button class="lang-switch" onclick="I18N.toggleLocale();applyLang()">
  <span class="lang-toggle-label"></span>
</button>
<div class="login-box">
  <h1>OpenDaemon</h1>
  <p data-i18n="tagline">The self-evolving agent harness</p>
  <form onsubmit="login(event)">
    <input type="password" id="pw" autofocus>
    <button type="submit" id="btn" data-i18n="login">Login</button>
  </form>
  <div class="error" id="err"></div>
</div>
<script>
// If already authenticated, redirect to main page
fetch('/api/ping').then(r => { if (r.ok) window.location.replace('/'); }).catch(() => {});

function applyLang() {
  I18N.translatePage();
  document.getElementById('pw').placeholder = t('password');
}
applyLang();

async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  btn.disabled = true;
  err.style.display = 'none';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('pw').value }),
    });
    if (res.ok) {
      window.location.replace('/');
    } else {
      const data = await res.json();
      err.textContent = data.error || t('loginFailed');
      err.style.display = 'block';
    }
  } catch (e) {
    err.textContent = t('connectionError');
    err.style.display = 'block';
  }
  btn.disabled = false;
}
</script>
</body>
</html>
